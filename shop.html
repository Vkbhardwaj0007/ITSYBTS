<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoltMart Store | ITSYBTS TECHNOLOGY</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #121212;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  
    <!-- Dropdown Toggle Script -->
    <script>
        function toggleDropdown(element, event) {
            event.stopPropagation();
            document.querySelectorAll('.mobile-dropdown').forEach(el => {
                if (el !== element.parentElement) {
                    el.classList.remove('active-dropdown');
                }
            });
            element.parentElement.classList.toggle('active-dropdown');
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', () => {
            document.querySelectorAll('.mobile-dropdown').forEach(el => {
                el.classList.remove('active-dropdown');
            });
        });
    </script>
</body>
</html>
