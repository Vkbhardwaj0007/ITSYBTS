<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ITSYBTS TECHNOLOGY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --dark: #0a0f1c;
            --dark-2: #111827;
            --accent: #06d6a0;
            --text: #e2e8f0;
            --glass: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        #circuit-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #0a0f1c;
        }

        /* Form Container */
        .login-card {
            position: relative;
            z-index: 10;
            width: 400px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            animation: dropIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes dropIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-header i {
            font-size: 40px;
            color: var(--primary);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-box {
            position: relative;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .input-box:focus-within {
            background: rgba(14, 165, 233, 0.1);
            border-color: var(--primary);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }

        .icon-wrapper {
            position: absolute;
            width: 70px;
            height: 70px;
            background: var(--dark-2);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2;
        }

        .user-box .icon-wrapper { left: -15px; }
        .pass-box .icon-wrapper { right: -15px; }

        .icon-wrapper i { font-size: 22px; color: var(--primary); transition: 0.3s; }
        .input-box:focus-within .icon-wrapper { background: var(--primary); box-shadow: 0 0 25px rgba(14, 165, 233, 0.6); }
        .input-box:focus-within .icon-wrapper i { color: white; }

        .input-box input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0 25px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
        }

        .user-box input { padding-left: 70px; }
        .pass-box input { padding-right: 70px; }

        .login-btn {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), #2563eb);
            border-radius: 50px;
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .login-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(14, 165, 233, 0.6); }

        .notif {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 40px;
            background: #ef4444;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
        }

        .notif.show { top: 40px; }
        .notif.success { background: var(--accent); color: var(--dark); }

        .otp-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .otp-overlay.active { display: flex; }

        .otp-box {
            width: 400px;
            background: var(--dark-2);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            animation: popUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popUp { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .otp-box h2 { font-family: 'Outfit', sans-serif; color: white; margin-bottom: 10px; }
        .otp-box p { color: var(--text-dim); font-size: 13px; margin-bottom: 25px; }

        .verify-btn {
            width: 100%;
            height: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .face-frame {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 25px;
            border-radius: 40px;
            border: 2px solid var(--glass-border);
            overflow: hidden;
            background: #000;
        }

        .scanning-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            z-index: 5;
            animation: scanMove 2s infinite linear;
        }

        @keyframes scanMove { 0%, 100% { top: 0% } 50% { top: 95% } }

        .face-frame video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>

<body style="background: transparent;">
    
    <div class="notif" id="notif"></div>

    <!-- FACE VERIFICATION MODAL -->
    <div id="face-modal" class="otp-overlay">
        <div class="otp-box" style="width: 450px;">
            <div style="width: 60px; height: 60px; background: rgba(6, 214, 160, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--accent); margin: 0 auto 20px; font-size: 24px;">
                <i class="fas fa-face-viewfinder"></i>
            </div>
            <h2>Biometric Face Match</h2>
            <p>Scanning facial features for identity confirmation.</p>

            <div class="face-frame">
                <div id="scan-line" class="scanning-line" style="display: none;"></div>
                <video id="login-video" autoplay playsinline></video>
                <div id="face-match-result" style="position: absolute; inset: 0; background: rgba(6, 214, 160, 0.8); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 10;">
                    <i class="fas fa-check-circle" style="font-size: 50px; color: white; margin-bottom: 10px;"></i>
                    <span style="font-weight: 800; color: white;">IDENTITY MATCHED</span>
                </div>
            </div>

            <div id="face-status" style="font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 25px;">Wait for system initialization...</div>
            <button class="verify-btn" id="face-btn" onclick="startFaceMatch()">START BIOMETRIC SCAN</button>
            <div style="margin-top: 20px; color: var(--text-dim); font-size: 11px; cursor: pointer;" onclick="closeFaceModal()">Abort Verification</div>
        </div>
    </div>

    <div class="login-card">
        <div class="logo-header">
            <i class="fas fa-microchip"></i>
            <h1>SECURE LOGIN</h1>
        </div>

        <form onsubmit="handleAuth(event)">
            <div class="input-box user-box">
                <div class="icon-wrapper"><i class="far fa-user"></i></div>
                <input type="text" id="login-id" placeholder="Administrator ID" required autocomplete="off">
            </div>
            <div class="input-box pass-box">
                <input type="password" id="login-pass" placeholder="Authorization Key" required>
                <div class="icon-wrapper"><i class="fas fa-lock" style="cursor: pointer;" onclick="togglePass()"></i></div>
            </div>
            <button type="submit" class="login-btn" id="login-btn">INITIALIZE</button>
        </form>
    </div>

    <script>
        function togglePass() {
            const input = document.getElementById('login-pass');
            const icon = document.querySelector('.pass-box i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-lock', 'fa-unlock');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-unlock', 'fa-lock');
            }
        }

        function showNotif(msg, type = 'error') {
            const n = document.getElementById('notif');
            n.innerText = msg;
            n.className = type === 'success' ? 'notif success show' : 'notif show';
            if (type !== 'success') setTimeout(() => n.classList.remove('show'), 3000);
        }

        let pendingAuth = null;
        let loginStream = null;

        function handleAuth(e) {
            e.preventDefault();
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if (id.toUpperCase() === 'BTSTECH0007' && pass === 'BTS@0007') {
                grantAccess('BTSTECH0007', 'master');
                return;
            }
            const systemUsers = JSON.parse(localStorage.getItem('bts_system_users') || '[]');
            const user = systemUsers.find(u => u.id === id && u.pass === pass);
            if (user) {
                pendingAuth = user;
                openFaceModal();
            } else {
                showNotif("Invalid Credentials. Access Denied.", 'error');
            }
        }

        function openFaceModal() {
            document.getElementById('face-modal').classList.add('active');
            document.getElementById('face-status').innerText = "System ready. Click below to start.";
        }

        function closeFaceModal() {
            if (loginStream) { loginStream.getTracks().forEach(t => t.stop()); loginStream = null; }
            document.getElementById('face-modal').classList.remove('active');
            pendingAuth = null;
        }

        function startFaceMatch() {
            const btn = document.getElementById('face-btn');
            const status = document.getElementById('face-status');
            const scanLine = document.getElementById('scan-line');
            btn.style.display = 'none';
            status.innerText = "Accessing Camera...";
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                loginStream = stream;
                document.getElementById('login-video').srcObject = stream;
                scanLine.style.display = 'block';
                const phases = [
                    { t: 0, m: "Adjusting focus..." },
                    { t: 1500, m: "Extracting facial features..." },
                    { t: 3000, m: "Comparing with stored credentials..." },
                    { t: 4500, m: "Finalizing identity link..." }
                ];
                phases.forEach(p => setTimeout(() => status.innerText = p.m, p.t));
                setTimeout(() => {
                    document.getElementById('face-match-result').style.display = 'flex';
                    scanLine.style.display = 'none';
                    status.innerText = "MATCH 100% SUCCESSFUL";
                    status.style.color = "var(--accent)";
                    setTimeout(() => grantAccess(pendingAuth.id, pendingAuth.role, pendingAuth.photo), 1500);
                }, 6000);
            }).catch(() => {
                alert("Face ID requires camera access.");
                closeFaceModal();
            });
        }

        function grantAccess(userId, role, photoUrl = null) {
            if (photoUrl) {
                const n = document.getElementById('notif');
                n.innerHTML = `<img src="${photoUrl}" style="width:30px;height:30px;border-radius:50%;margin-right:10px;vertical-align:middle;"> <span>Identity & Face Verified! Redirecting...</span>`;
                n.className = 'notif success show';
            } else showNotif("Master Identity Verified. Redirecting...", 'success');
            const btn = document.getElementById('login-btn');
            btn.innerText = "AUTHENTICATING...";
            btn.style.opacity = "0.7";
            localStorage.setItem('bts_auth', 'true');
            localStorage.setItem('bts_current_user_id', userId);
            localStorage.setItem('bts_user_role', role);
            setTimeout(() => window.location.href = 'inventory.html', 1500);
        }

        (function () {
            const canvas = document.getElementById('circuit-bg');
            const ctx = canvas.getContext('2d');
            let particles = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4;
                    this.size = Math.random() * 2 + 1;
                    this.isLogo = Math.random() > 0.92; // 8% chance to be a logo particle
                }
                update() {
                    this.x += this.vx; this.y += this.vy;
                    if(this.x<0 || this.x>canvas.width) this.vx*=-1;
                    if(this.y<0 || this.y>canvas.height) this.vy*=-1;
                }
                draw() {
                    ctx.fillStyle = this.isLogo ? 'rgba(14, 165, 233, 0.8)' : 'rgba(14, 165, 233, 0.5)';
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                    
                    if (this.isLogo) {
                        ctx.font = 'bold 10px Outfit, sans-serif';
                        ctx.fillText('BTS', this.x + 8, this.y + 4);
                    }
                }
            }
            for (let i = 0; i < 80; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath(); ctx.strokeStyle = 'rgba(14, 165, 233, 0.08)'; ctx.lineWidth = 0.5;
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dist = Math.sqrt(Math.pow(particles[i].x - particles[j].x, 2) + Math.pow(particles[i].y - particles[j].y, 2));
                        if (dist < 150) { ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); }
                    }
                }
                ctx.stroke();
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>

    <!-- Dropdown Toggle Script -->
    <script>
        function toggleDropdown(element, event) {
            event.stopPropagation();
            document.querySelectorAll('.mobile-dropdown').forEach(el => {
                if (el !== element.parentElement) {
                    el.classList.remove('active-dropdown');
                }
            });
            element.parentElement.classList.toggle('active-dropdown');
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', () => {
            document.querySelectorAll('.mobile-dropdown').forEach(el => {
                el.classList.remove('active-dropdown');
            });
        });
    </script>
</body>
</html>
